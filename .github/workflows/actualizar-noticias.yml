name: Actualizar noticias CPGs

on:
  # Se ejecuta automáticamente cada noche a las 23:00 UTC (00:00 hora España invierno, 01:00 verano)
  schedule:
    - cron: '0 10 * * *'
  # Permite ejecutarlo a mano desde la pestaña Actions
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # necesario para poder hacer commit
    
    steps:
      - name: Clonar el repo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Descargar correos nuevos de Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: python download_from_drive.py nuevos-eml

      - name: Procesar correos y regenerar HTML
        run: |
          if [ -d "nuevos-eml" ] && [ "$(ls -A nuevos-eml 2>/dev/null)" ]; then
            echo "Procesando correos nuevos..."
            python rebuild.py \
              --new-emails nuevos-eml \
              --existing noticias.json \
              --template template.html \
              --out index.html
          else
            echo "Sin correos nuevos. Saltando regeneración."
          fi

      - name: Hacer commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add noticias.json index.html
          if git diff --staged --quiet; then
            echo "Sin cambios que comitear."
          else
            git commit -m "Auto: actualizar noticias [$(date +'%Y-%m-%d')]"
            git push
            echo "Cambios publicados."
          fi
